services:
  server:
    image: ghcr.io/hackerflo/uni-planner-server:latest
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGIN}
      DATABASE_PATH: /app/data/planner.db
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      NOTIFICATION_ENCRYPT_KEY: ${NOTIFICATION_ENCRYPT_KEY}
    volumes:
      - db_data:/app/data
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  client:
    image: ghcr.io/hackerflo/uni-planner-client:latest
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "8080:80"
    depends_on:
      - server
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_SCHEDULE: "0 0 4 * * *"
      WATCHTOWER_INCLUDE_STOPPED: "false"
      WATCHTOWER_LABEL_ENABLE: "true"
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M

volumes:
  db_data:
