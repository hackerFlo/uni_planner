name: Build and push Docker images

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image names
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          SHA=${{ github.sha }}
          echo "SERVER_IMAGE=ghcr.io/${OWNER}/uni-planner-server" >> $GITHUB_ENV
          echo "CLIENT_IMAGE=ghcr.io/${OWNER}/uni-planner-client" >> $GITHUB_ENV
          echo "SHA_TAG=${SHA::7}" >> $GITHUB_ENV

      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          no-cache: true
          tags: |
            ${{ env.SERVER_IMAGE }}:latest
            ${{ env.SERVER_IMAGE }}:${{ env.SHA_TAG }}

      - name: Build and push client
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          no-cache: true
          tags: |
            ${{ env.CLIENT_IMAGE }}:latest
            ${{ env.CLIENT_IMAGE }}:${{ env.SHA_TAG }}
